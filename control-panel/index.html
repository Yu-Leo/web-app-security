<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="description" content="Web App Security Control Panel" />
        <link rel="icon" type="image/ico" href="/favicon.ico" />
        <style>
            a {
                color: #198754;
            }
            a:hover {
                color: #146c43;
            }
            .btn-primary {
                background-color: #198754;
                border-color: #198754;
            }
            .btn-primary:hover,
            .btn-primary:focus,
            .btn-primary:active {
                background-color: #146c43;
                border-color: #146c43;
            }
            .page-item.active .page-link {
                background-color: #198754;
                border-color: #198754;
            }
            .page-link {
                color: #198754;
            }
            .page-link:hover {
                color: #146c43;
            }
            .form-check-input:checked {
                background-color: #198754;
                border-color: #198754;
            }
            .form-control:focus,
            .form-select:focus,
            .form-check-input:focus {
                border-color: #198754;
                box-shadow: 0 0 0 0.25rem rgba(25, 135, 84, 0.25);
            }
        </style>
        <title>Web App Security – Панель управления</title>
    </head>
    <body>
        <div id="root"></div>
        <script type="module" src="/src/main.tsx"></script>
    </body>
