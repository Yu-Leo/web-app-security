openapi: 3.0.3
info:
  title: WAS API
  version: "1.0.0"

tags:
  - name: resources
    description: Resource management
  - name: security-profiles
    description: Security profile management
  - name: security-rules
    description: Security rule management
  - name: traffic-profiles
    description: Traffic profile management
  - name: traffic-rules
    description: Traffic rule management
  - name: ml-models
    description: ML model management
  - name: request-logs
    description: Request logs
  - name: event-logs
    description: Event logs

paths:
  /_info:
    get:
      summary: Service info
      responses:
        "200":
          description: OK
  /api/v1/resources:
    get:
      operationId: ListResources
      tags:
        - resources
      summary: List resources
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Resource"
    post:
      operationId: CreateResource
      tags:
        - resources
      summary: Create resource
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ResourceCreate"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
  /api/v1/resources/{id}:
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
          format: int64
    get:
      operationId: GetResource
      tags:
        - resources
      summary: Get resource by id
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Resource"
        "404":
          description: Not found
    put:
      operationId: UpdateResource
