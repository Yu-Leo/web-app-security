components:
  schemas:
    Resource:
      type: object
      required:
        - id
        - name
        - url_pattern
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        url_pattern:
          type: string
        security_profile_id:
          type: integer
          format: int64
          nullable: true
        traffic_profile_id:
          type: integer
          format: int64
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    ResourceCreate:
      type: object
      required:
        - name
        - url_pattern
      properties:
        name:
          type: string
        url_pattern:
          type: string
        security_profile_id:
          type: integer
          format: int64
          nullable: true
        traffic_profile_id:
          type: integer
          format: int64
          nullable: true
    ResourceUpdate:
      type: object
      required:
        - name
        - url_pattern
      properties:
        name:
          type: string
        url_pattern:
          type: string
        security_profile_id:
          type: integer
          format: int64
          nullable: true
        traffic_profile_id:
          type: integer
          format: int64
          nullable: true
    SecurityProfile:
      type: object
      required:
        - id
        - name
        - base_action
        - log_enabled
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        base_action:
          type: string
          enum: [allow, block]
        log_enabled:
          type: boolean
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecurityProfileCreate:
      type: object
      required:
        - name
        - base_action
        - log_enabled
        - is_enabled
      properties:
        name:
          type: string
        description:
          type: string
        base_action:
          type: string
          enum: [allow, block]
        log_enabled:
          type: boolean
        is_enabled:
          type: boolean
    SecurityProfileUpdate:
      type: object
      required:
        - name
        - base_action
        - log_enabled
        - is_enabled
      properties:
        name:
          type: string
        description:
          type: string
        base_action:
          type: string
          enum: [allow, block]
        log_enabled:
          type: boolean
        is_enabled:
          type: boolean
    SecurityRule:
      type: object
      required:
        - id
        - profile_id
        - name
        - priority
        - rule_type
        - action
        - dry_run
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        profile_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
          format: int32
        rule_type:
          type: string
          enum: [deterministic, ml]
        action:
          type: string
          enum: [allow, block]
        conditions:
          $ref: "#/components/schemas/SecurityRuleConditions"
          nullable: true
        ml_model_id:
          type: integer
          format: int64
          nullable: true
        ml_threshold:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          nullable: true
        dry_run:
          type: boolean
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    SecurityRuleCreate:
      type: object
      required:
        - profile_id
        - name
        - priority
        - rule_type
        - action
        - dry_run
        - is_enabled
      properties:
        profile_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
          format: int32
        rule_type:
          type: string
          enum: [deterministic, ml]
        action:
          type: string
          enum: [allow, block]
        conditions:
          $ref: "#/components/schemas/SecurityRuleConditions"
          nullable: true
        ml_model_id:
          type: integer
          format: int64
          nullable: true
        ml_threshold:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          nullable: true
        dry_run:
          type: boolean
        is_enabled:
          type: boolean
    SecurityRuleUpdate:
      type: object
      required:
        - profile_id
        - name
        - priority
        - rule_type
        - action
        - dry_run
        - is_enabled
      properties:
        profile_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
          format: int32
        rule_type:
          type: string
          enum: [deterministic, ml]
        action:
          type: string
          enum: [allow, block]
        conditions:
          $ref: "#/components/schemas/SecurityRuleConditions"
          nullable: true
        ml_model_id:
          type: integer
          format: int64
          nullable: true
        ml_threshold:
          type: integer
          format: int32
          minimum: 0
          maximum: 100
          nullable: true
        dry_run:
          type: boolean
        is_enabled:
          type: boolean
    TrafficProfile:
      type: object
      required:
        - id
        - name
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TrafficProfileCreate:
      type: object
      required:
        - name
        - is_enabled
      properties:
        name:
          type: string
        description:
          type: string
        is_enabled:
          type: boolean
    TrafficProfileUpdate:
      type: object
      required:
        - name
        - is_enabled
      properties:
        name:
          type: string
        description:
          type: string
        is_enabled:
          type: boolean
    TrafficRule:
      type: object
      required:
        - id
        - profile_id
        - name
        - priority
        - dry_run
        - match_all
        - requests_limit
        - period_seconds
        - is_enabled
        - created_at
        - updated_at
      properties:
        id:
          type: integer
          format: int64
        profile_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
          format: int32
        dry_run:
          type: boolean
        match_all:
          type: boolean
        requests_limit:
          type: integer
          format: int32
        period_seconds:
          type: integer
          format: int32
        conditions:
          $ref: "#/components/schemas/SecurityRuleConditions"
          nullable: true
        is_enabled:
          type: boolean
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    TrafficRuleCreate:
      type: object
      required:
        - profile_id
        - name
        - priority
        - dry_run
        - match_all
        - requests_limit
        - period_seconds
        - is_enabled
      properties:
        profile_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
          format: int32
        dry_run:
          type: boolean
        match_all:
          type: boolean
        requests_limit:
          type: integer
          format: int32
        period_seconds:
          type: integer
          format: int32
        conditions:
          $ref: "#/components/schemas/SecurityRuleConditions"
          nullable: true
        is_enabled:
          type: boolean
    TrafficRuleUpdate:
      type: object
      required:
        - profile_id
        - name
        - priority
        - dry_run
        - match_all
        - requests_limit
        - period_seconds
        - is_enabled
      properties:
        profile_id:
          type: integer
          format: int64
        name:
          type: string
        description:
          type: string
        priority:
          type: integer
          format: int32
        dry_run:
          type: boolean
        match_all:
          type: boolean
        requests_limit:
          type: integer
          format: int32
        period_seconds:
          type: integer
          format: int32
        conditions:
          $ref: "#/components/schemas/SecurityRuleConditions"
          nullable: true
        is_enabled:
          type: boolean
    SecurityHeaderCondition:
      type: object
      required:
        - name
        - value_regex
      properties:
        name:
          type: string
        value_regex:
          type: array
          items:
            type: string
    SecurityRuleConditions:
      type: object
      description: |
        Условия для security rules. Блоки разных типов объединяются по AND.
        Внутри одного блока значения объединяются по OR.
      properties:
        source_ip_cidr:
          type: array
          items:
            type: string
          description: CIDR диапазоны клиентских IP
        uri_regex:
          type: array
          items:
            type: string
          description: Регулярные выражения для HTTP URI
        host_regex:
          type: array
          items:
            type: string
          description: Регулярные выражения для host
        method_regex:
          type: array
          items:
            type: string
          description: Регулярные выражения для HTTP метода
        headers:
          type: array
          items:
            $ref: "#/components/schemas/SecurityHeaderCondition"
          description: Условия по имени заголовка и regexp значения
    RuleConditions:
      type: object
      description: |
        Условия для правил безопасности и лимитов трафика. Все блоки объединяются по AND.
        Внутри каждого блока значения объединяются по OR.
      properties:
        methods:
          type: array
          items:
            type: string
          description: HTTP методы (GET, POST и т.п.)
        path_regex:
          type: array
          items:
            type: string
          description: Регулярные выражения для пути
        path_prefix:
          type: array
          items:
            type: string
          description: Префиксы пути
        query_regex:
          type: array
          items:
            type: string
          description: Регулярные выражения для query-string
        hosts:
          type: array
          items:
            type: string
          description: Точные значения host
        host_regex:
          type: array
          items:
            type: string
          description: Регулярные выражения для host
        headers:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Карта header -> список допустимых значений
        headers_regex:
          type: object
          additionalProperties:
            type: array
            items:
              type: string
          description: Карта header -> список regex для значения
        ip_cidr:
          type: array
          items:
