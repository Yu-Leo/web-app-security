apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "postgresql.fullname" . }}-password-generator
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  template:
    spec:
      restartPolicy: Never
      containers:
      - name: password-generator
        image: alpine/k8s:1.28.3
        command:
        - /bin/sh
        - -c
        - |
          set -e
          echo "Generating PostgreSQL passwords..."
          
          # Install required tools
          apk add --no-cache curl jq openssl python3 py3-urllib3
          
          # Generate random passwords (using hex to avoid special chars issues)
          USER_PASSWORD=$(openssl rand -hex 32)
          ADMIN_PASSWORD=$(openssl rand -hex 32)
          
          # URL-encode the password for database URL
          URL_ENCODED_PASSWORD=$(python3 -c "import urllib.parse; print(urllib.parse.quote('$USER_PASSWORD'))")
          
          # Create Kubernetes secret for PostgreSQL to use
          kubectl create secret generic postgresql \
            --namespace={{ .Values.namespace }} \
            --from-literal=password="$USER_PASSWORD" \
            --from-literal=postgres-password="$ADMIN_PASSWORD" \
            --dry-run=client -o yaml | kubectl apply -f -
          
          echo "PostgreSQL secret created in namespace {{ .Values.namespace }}"
      serviceAccountName: {{ include "postgresql.fullname" . }}-sa
---
# ServiceAccount for the job
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "postgresql.fullname" . }}-sa
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
---
# Role to create secrets
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "postgresql.fullname" . }}-secret-creator
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
rules:
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["create", "update", "patch", "get"]
---
# RoleBinding
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "postgresql.fullname" . }}-secret-creator
  namespace: {{ .Values.namespace }}
  annotations:
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "-10"
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "postgresql.fullname" . }}-secret-creator
subjects:
- kind: ServiceAccount
  name: {{ include "postgresql.fullname" . }}-sa
  namespace: {{ .Values.namespace }}
